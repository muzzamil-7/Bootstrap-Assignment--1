<!doctype html>

<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <div class="container-fluid  text-center align-items-start position-fixed">

        <div class="row">

            <div class="col-sm-12 bg-success py-2">

                <div class="row w-100 m-0 ">
                    <div class="col-sm-4 text-start ps-2">

                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz5iNo-jFihIUfEWC2AAJWKkMlebgvtvocG3pBdBXZRQ&s=10"
                            alt="my picture" class="img-fluid rounded-circle"
                            style="width: 50px; height: 50px; object-fit: cover;">
                    </div>



                </div>

            </div>

        </div>

    </div>

    <div class="container vh-100  d-flex justify-content-center align-items-center ">

        <div class="row  w-100 h-50 justify-content-center">

            <div class=" col-sm-4  bg-primary text-white p-4 rounded shadow ">
                <h2 class="text-center mb-4">Login</h2>
                <form>

                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Email address</label>
                        <input type="email" class="form-control mb-3" id="exampleFormControlInput1"
                            placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label for="inputPassword"
                            class="col-form-label text-white justify-content-center align-items-center">Password</label>
                        <input type="password" class="form-control" id="inputPassword"
                            placeholder="Enter your password">
                    </div>

                    <div class="d-flex justify-content-end">
                        <a type="submit" class="btn btn-light text-primary fw-bold" href="studentdashboard.html">Login</a>
                    </div>

                </form>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.   3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
